---
##############################################
# Proxmox Init Configure
##############################################
- name: "Proxmox init-configure"
  hosts: proxmox_nodes
  gather_facts: false
  become: true

  roles:
    
    # Create Containers
    - role: proxmox-create-containers
      tags:
        - proxmox-init
        - lxc

    # Provision VMs (Customize Image, Template and Clone)
    - role: create-proxmox-vms
      tags:
        - proxmox-init
        - vms

##############################################
# Running in all hosts
##############################################
- name: "Creating the user and configuring ssh"
  hosts: all
  become: true
  gather_facts: false

  roles:
    - role: configure-remote-ssh
      tags:
        - deploy-infra
        - lxc
        - vms

# #############################################
# # Executing only in 'dns' host
# #############################################
- name: "Configuring the DNS Server"
  hosts: dns
  remote_user: adguard
  become: true
  gather_facts: false

  roles:
    - role: dns-server
      tags:
        - deploy-infra
        - lxc


# #############################################
# # Executing only in 's3' host
# #############################################
- name: "Configuring the Garage S3 Server"
  hosts: s3
  become: true
  gather_facts: true

  roles:
    - role: garage-s3
      tags:
        - deploy-infra
        - lxc


##############################################
# RClone Configuration
##############################################
- name: "Configuring RClone for backups"
  hosts: localhost,dns,s3
  become: false
  gather_facts: true

  roles:
    - role: rclone
      tags:
        - deploy-infra
        - lxc

##############################################
# Running in all hosts
##############################################
- name: "Configure all VMs"
  hosts: vms_all
  become: true
  gather_facts: false

  roles:
    - role: create-proxmox-vms
      tags:
        - deploy-infra
        - vms

    - role: dns-client
      tags:
        - deploy-infra
        - vms


##############################################
# Opening 6443 port on cluster k8s Firewall
##############################################
- name: "Applying firewall settings to k8s cluster nodes"
  hosts: k8s_cluster
  become: true
  gather_facts: true

  roles:
    - role: kubernetes-firewall
      tags:
        - deploy-infra
        - vms

##############################################
# Installing k3s
##############################################
- name: "Installing k3s servers"
  hosts: k8s_masters_nodes
  become: true
  gather_facts: false

  roles:
    - role: kubernetes-install-masters
      tags:
        - deploy-infra
        - k3s-install
        - vms

- name: "Installing k3s nodes"
  hosts: k8s_worker_nodes
  become: true
  gather_facts: false

  roles:
    - role: kubernetes-install-nodes
      tags:
        - deploy-infra
        - k3s-install
        - vms

