---

- name: "Enable SSH password authentication and root login"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?\\s*PasswordAuthentication', line: 'PasswordAuthentication yes' }
    - { regexp: '^#?\\s*PermitRootLogin', line: 'PermitRootLogin yes' }

- name: "restart sshd"
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: "Create directory for resolved.conf.d (Port 53 conflict fix)"
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: '0755'

- name: "Configure systemd-resolved to disable stub listener"
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/adguard.conf
    content: |
      [Resolve]
      DNSStubListener=no
    mode: '0644'

- name: "Restart systemd-resolved to apply changes"
  ansible.builtin.service:
    name: systemd-resolved
    state: restarted

- name: "Download AdGuardHome archive"
  ansible.builtin.get_url:
    url: "{{ adguard_url }}"
    dest: "{{ adguard_archive }}"
    mode: "0644"

- name: "Extract AdGuardHome"
  ansible.builtin.unarchive:
    src: "{{ adguard_archive }}"
    dest: "{{ adguard_installation_dir }}"
    remote_src: true
    creates: "{{ adguard_installation_dir }}/AdGuardHome/AdGuardHome"

- name: "Ensure AdGuardHome binary has execution permissions"
  ansible.builtin.file:
    path: "{{ adguard_installation_dir }}/AdGuardHome/AdGuardHome"
    mode: '0755'
    state: file

- name: "Check if AdGuardHome service is running"
  ansible.builtin.command: systemctl is-active AdGuardHome
  register: adguard_status
  changed_when: false
  failed_when: false

- name: "Run AdGuardHome installer"
  ansible.builtin.command: ./AdGuardHome -s install
  args:
    chdir: "{{ adguard_installation_dir }}/AdGuardHome"
  register: adguard_install
  changed_when: "'installed' in adguard_install.stdout or adguard_install.rc == 0"
  when: adguard_status.stdout != 'active'

