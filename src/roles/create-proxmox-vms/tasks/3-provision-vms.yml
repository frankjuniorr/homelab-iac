---
- name: "Provision and Configure VMs (Shell Mode)"
  ansible.builtin.include_tasks: provision_vm_tasks.yml
  loop: "{{ groups['vms_all'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"

- name: "Ensure VMs are started"
  ansible.builtin.shell: "qm start {{ hostvars[item].proxmox_vm_id }} || true"
  loop: "{{ groups['vms_all'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  changed_when: true

- name: "Wait for SSH to be ready on VMs"
  ansible.builtin.wait_for:
    host: "{{ hostvars[item].ansible_host }}"
    port: 22
    state: started
    delay: 5
    timeout: 300
  loop: "{{ groups['vms_all'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
