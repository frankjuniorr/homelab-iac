---
- name: "Provision and Configure VMs (Shell Mode)"
  ansible.builtin.include_tasks: provision_vm_tasks.yml
  loop: "{{ groups['vms_all'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"

- name: "Ensure VMs are started"
  ansible.builtin.shell: |
    if qm status {{ hostvars[item].proxmox_vm_id }} | grep -q "status: running"; then
      echo "already_running"
    else
      qm start {{ hostvars[item].proxmox_vm_id }}
      echo "started"
    fi
  loop: "{{ groups['vms_all'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  register: vm_start_result
  changed_when: "'started' in vm_start_result.stdout"

- name: "Wait for SSH to be ready on VMs"
  ansible.builtin.wait_for:
    host: "{{ hostvars[item].ansible_host }}"
    port: 22
    state: started
    delay: 5
    timeout: 300
  loop: "{{ groups['vms_all'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
