---
- name: "Update all packages to the latest version"
  become: true
  ansible.builtin.apt:
    name: "*"
    state: latest
    update_cache: yes
  tags:
    - update-all
    - update-guests

- name: "Cleanup apt cache and unused packages"
  become: true
  ansible.builtin.apt:
    autoclean: yes
    autoremove: yes
  tags:
    - update-all
    - update-guests

- name: "Check if reboot is required"
  become: true
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  tags:
    - update-all
    - update-guests

- name: "Restart machine if required"
  become: true
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible due to kernel updates"
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: uptime
  when: reboot_required_file.stat.exists
  tags:
    - update-all
    - update-guests
