---
- name: Check if Garage configuration exists
  ansible.builtin.stat:
    path: "{{ garage_config_dir }}/garage.toml"
  register: garage_config_file

- name: Read existing Garage secrets
  ansible.builtin.shell: |
    grep "{{ item.pattern }}" {{ garage_config_dir }}/garage.toml | cut -d'"' -f2
  loop:
    - { pattern: 'rpc_secret =', var: 'garage_rpc_secret' }
    - { pattern: 'admin_token =', var: 'garage_admin_token' }
  register: existing_secrets
  when: garage_config_file.stat.exists
  changed_when: false
  failed_when: false

- name: Set existing secret facts
  ansible.builtin.set_fact:
    "{{ item.item.var }}": "{{ item.stdout }}"
  loop: "{{ existing_secrets.results }}"
  when: garage_config_file.stat.exists and item.stdout | length > 0 and (hostvars[inventory_hostname][item.item.var] is not defined)

- name: Generate Garage RPC secret dynamically
  ansible.builtin.shell: "openssl rand -hex 32"
  register: generated_rpc_secret
  changed_when: false
  run_once: true
  delegate_to: localhost
  become: false
  when: garage_rpc_secret is not defined

- name: Generate Garage Admin token dynamically
  ansible.builtin.shell: "openssl rand -hex 32"
  register: generated_admin_token
  changed_when: false
  run_once: true
  delegate_to: localhost
  become: false
  when: garage_admin_token is not defined

- name: Set Garage secret facts (generated)
  ansible.builtin.set_fact:
    garage_rpc_secret: "{{ generated_rpc_secret.stdout | default(garage_rpc_secret) }}"
    garage_admin_token: "{{ generated_admin_token.stdout | default(garage_admin_token) }}"

# - name: Create garage group
