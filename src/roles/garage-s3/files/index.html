<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage S3 - Storage Node</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: #2d2d2d;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        h1 { color: #f39c12; margin-bottom: 0.5rem; }
        p { color: #aaa; margin-bottom: 2rem; }
        .status {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #27ae60;
            color: white;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .logo {
            width: 80px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="20" width="80" height="60" rx="5" fill="#f39c12"/>
            <path d="M10 40 L90 40" stroke="#1a1a1a" stroke-width="2"/>
            <circle cx="25" cy="30" r="3" fill="#1a1a1a"/>
            <circle cx="35" cy="30" r="3" fill="#1a1a1a"/>
        </svg>
        <h1>Jupiter Node</h1>
        <p>Garage S3 Object Storage Service</p>
        <div class="status">ONLINE</div>
    </div>
</body>
</html>
