---
# Base Configuration for Guest OS (Ubuntu 24.04 LTS)
# Using APT package manager and native modules

- name: "Update apt cache"
  become: true
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Install base packages"
  become: true
  ansible.builtin.apt:
    name:
      - openssh-server
      - figlet
      - cockpit
      - unzip
      - tar
      - vim
      - jq
      - yq
      - rsync
      - python3
      - python3-pip
      - curl
      - lsof
    state: present

- name: "Set user and password variables"
  ansible.builtin.set_fact:
    vm_user: "{{ hostvars[inventory_hostname].vm_user }}"
    vm_user_passwd: "{{ hostvars[inventory_hostname].vm_user_passwd }}"

- name: "Ensure the guest user exists"
  become: true
  ansible.builtin.user:
    name: "{{ vm_user }}"
    shell: /bin/bash
    groups: sudo
    append: yes
    state: present

- name: "Set user password (chpasswd)"
  become: true
  ansible.builtin.shell: "echo '{{ vm_user }}:{{ vm_user_passwd }}' | chpasswd"
  changed_when: false

- name: "Configure NOPASSWD for the sudo group"
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/sudoers
    regexp: '^%sudo'
    line: '%sudo ALL=(ALL) NOPASSWD: ALL'
    state: present
    validate: visudo -cf %s

- name: "Configure SSH directory for the user"
  become: true
  ansible.builtin.file:
    path: "/home/{{ vm_user }}/.ssh"
    state: directory
    owner: "{{ vm_user }}"
    group: "{{ vm_user }}"
    mode: '0700'

- name: "Inject SSH public key"
  become: true
  ansible.builtin.authorized_key:
    user: "{{ vm_user }}"
    state: present
    key: "{{ lookup('file', ssh_public_key_file) }}"

- name: "Change MOTD (Welcome Banner)"
  become: true
  ansible.builtin.shell: "figlet -k $(hostname) > /etc/motd.d/10-welcome.motd"
  changed_when: false

- name: "Enable and start base services"
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - ssh
    - cockpit.socket
