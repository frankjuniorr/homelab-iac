---

- name: "Ensure Proxmox host has required Python tools (APT)"
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-requests
    state: present
    update_cache: yes
  delegate_to: "{{ inventory_hostname }}"

- name: "Install modern proxmoxer (>=2.0) via Pip3"
  ansible.builtin.pip:
    name: "proxmoxer>=2.0.0"
    executable: pip3
    extra_args: --break-system-packages
  delegate_to: "{{ inventory_hostname }}"

- name: "Choose Ubuntu container image"
  ansible.builtin.shell: "pveam available | grep \"ubuntu-24.04\" | awk '{print $2}'"
  register: container_image
  changed_when: false

- name: "Download Ubuntu container image"
  ansible.builtin.shell: "pveam download local {{ container_image.stdout }}"
  args:
    creates: "/var/lib/vz/template/cache/{{ container_image.stdout }}"

- name: "Create and Configure LXC Containers (Shell Mode)"
  ansible.builtin.shell: |
    if ! pct list | grep -q "^{{ hostvars[item].proxmox_vm_id }} "; then
      pct create {{ hostvars[item].proxmox_vm_id }} "local:vztmpl/{{ container_image.stdout }}" \
        --hostname {{ hostvars[item].proxmox_vm_name }} \
        --password {{ hostvars[item].root_password }} \
        --rootfs {{ cloud_init_template.vm_storage }}:{{ hostvars[item].proxmox_vm_disk_size | default('8G') | replace('G', '') }} \
        --cores {{ hostvars[item].proxmox_cpu }} \
        --memory {{ hostvars[item].proxmox_memory }} \
        --net0 name=eth0,bridge=vmbr0,ip={{ hostvars[item].ansible_host }}/24,gw={{ network_gateway }} \
        --onboot 1 \
        --unprivileged 1 \
        --features nesting=1
      
      # Adicionar chave SSH do root
      mkdir -p /tmp/ssh_keys_{{ hostvars[item].proxmox_vm_id }}
      cp {{ vm_ssh_public_key | default('/root/.ssh/id_rsa_homelab.pub') }} /tmp/ssh_keys_{{ hostvars[item].proxmox_vm_id }}/authorized_keys
      pct push {{ hostvars[item].proxmox_vm_id }} /tmp/ssh_keys_{{ hostvars[item].proxmox_vm_id }}/authorized_keys /root/.ssh/authorized_keys
      rm -rf /tmp/ssh_keys_{{ hostvars[item].proxmox_vm_id }}
    fi
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  changed_when: true

- name: "Ensure Containers are started"
  ansible.builtin.shell: "pct start {{ hostvars[item].proxmox_vm_id }} || true"
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  changed_when: true

- name: "Wait for Containers to initialize"
  ansible.builtin.pause:
    seconds: 15

- name: "Bootstrap: Basic configuration via pct exec (LXC only)"
  ansible.builtin.shell: |
    pct exec {{ hostvars[item].proxmox_vm_id }} -- bash -c "
      apt-get update && apt-get install -y python3 python3-pip openssh-server figlet cockpit && 
      useradd -m -s /bin/bash {{ hostvars[item].vm_user }} || true && 
      echo '{{ hostvars[item].vm_user }}:{{ hostvars[item].vm_user_passwd }}' | chpasswd &&
      usermod -aG sudo {{ hostvars[item].vm_user }} &&
      echo '%sudo ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/sudo &&
      chmod 440 /etc/sudoers.d/sudo &&
      sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      systemctl enable --now ssh
    "
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  tags:
    - proxmox-init
    - lxc

- name: "Write Proxmox Notes for Containers"
  ansible.builtin.include_role:
    name: proxmox-write-notes
  vars:
    proxmox_guest_group: "{{ groups['containers_lxc'] }}"
    proxmox_guest_type: "container"
  tags:
    - proxmox-init
    - lxc
