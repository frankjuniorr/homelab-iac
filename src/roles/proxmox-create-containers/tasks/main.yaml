---

# Download Rocky Linux container image
#############################################################################
- name: "Choose Rocky Linux container image"
  ansible.builtin.shell: "pveam available | grep \"rocky\" | awk '{print $2}'"
  register: container_image

- name: "Download Rocky Linux container image"
  ansible.builtin.shell: "pveam download local {{ container_image.stdout }}"
  args:
    creates: "/var/lib/vz/template/cache/{{ container_image.stdout }}"

# Create LXC Containers
#############################################################################
- name: "Create LXC container on Proxmox"
  ansible.builtin.shell: |
    pct create {{ hostvars[item].proxmox_vm_id }} /var/lib/vz/template/cache/{{ container_image.stdout }} \
        --hostname {{ hostvars[item].proxmox_vm_name }} \
        --storage {{ cloud_init_template.vm_storage }} \
        --rootfs {{ cloud_init_template.vm_storage }}:8 \
        --cores {{ hostvars[item].proxmox_cpu }} \
        --memory {{ hostvars[item].proxmox_memory }} \
        --net0 name=eth0,bridge=vmbr0,ip={{ hostvars[item].ansible_host }}/24,gw={{ hostvars[item].network_gateway }} \
        --password {{ hostvars[item].root_password }} \
        --ssh-public-keys /root/.ssh/id_rsa.pub \
        --tags "{{ hostvars[item].proxmox_vm_tags | default('') }}" \
        --start 1 \
        --onboot 1
  args:
    creates: "/etc/pve/lxc/{{ hostvars[item].proxmox_vm_id }}.conf"
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  register: container_creation

- name: "Update tags for LXC containers"
  ansible.builtin.shell: |
    pct set {{ hostvars[item].proxmox_vm_id }} --tags "{{ hostvars[item].proxmox_vm_tags | default('') }}"
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  changed_when: false

- name: "Bootstrap: Basic configuration via pct exec (LXC only)"
  ansible.builtin.shell: |
    pct exec {{ hostvars[item].proxmox_vm_id }} -- bash -c "
      dnf install -y python3.11 python3-dnf openssh-server && 
      useradd -m -s /bin/bash {{ hostvars[item].vm_user }} || true && 
      echo '{{ hostvars[item].vm_user }}:{{ hostvars[item].vm_user_passwd }}' | chpasswd &&
      usermod -aG wheel {{ hostvars[item].vm_user }} &&
      echo '%wheel ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/wheel &&
      chmod 440 /etc/sudoers.d/wheel &&
      sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
      systemctl enable --now sshd
    "
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  when: container_creation.changed
  tags:
    - proxmox-init
    - lxc

- name: "Write Proxmox Notes for Containers"
  ansible.builtin.include_role:
    name: proxmox-write-notes
  vars:
    proxmox_guest_group: "{{ groups['containers_lxc'] }}"
    proxmox_guest_type: "container"
  tags:
    - proxmox-init
    - lxc
