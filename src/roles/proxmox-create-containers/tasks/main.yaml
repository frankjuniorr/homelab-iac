---

- name: "Ensure Proxmox host has required Python tools (APT)"
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-requests
    state: present
    update_cache: yes
  delegate_to: "{{ inventory_hostname }}"

- name: "Install modern proxmoxer (>=2.0) via Pip3"
  ansible.builtin.pip:
    name: "proxmoxer>=2.0.0"
    executable: pip3
    extra_args: --break-system-packages
  delegate_to: "{{ inventory_hostname }}"

- name: "Choose Ubuntu container image"
  ansible.builtin.shell: "pveam available | grep \"ubuntu-24.04\" | awk '{print $2}'"
  register: container_image
  changed_when: false

- name: "Download Ubuntu container image"
  ansible.builtin.shell: "pveam download local {{ container_image.stdout }}"
  args:
    creates: "/var/lib/vz/template/cache/{{ container_image.stdout }}"

- name: "Create and Configure LXC Containers (Shell Mode)"
  ansible.builtin.include_tasks: create_lxc_tasks.yml
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"

- name: "Ensure Containers are started"
  ansible.builtin.shell: "pct start {{ hostvars[item].proxmox_vm_id }} || true"
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  changed_when: true

- name: "Wait for Containers to initialize"
  ansible.builtin.pause:
    seconds: 15

- name: "Bootstrap: Basic configuration via script (LXC only)"
  ansible.builtin.include_tasks: bootstrap_lxc_tasks.yml
  loop: "{{ groups['containers_lxc'] }}"
  loop_control:
    label: "{{ hostvars[item].proxmox_vm_name }}"
  tags:
    - proxmox-init
    - lxc

- name: "Write Proxmox Notes for Containers"
  ansible.builtin.include_role:
    name: proxmox-write-notes
  vars:
    proxmox_guest_group: "{{ groups['containers_lxc'] }}"
    proxmox_guest_type: "container"
  tags:
    - proxmox-init
    - lxc
