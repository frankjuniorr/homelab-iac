---
- name: "Proxmox Destroy"
  hosts: proxmox_nodes
  gather_facts: no
  become: yes

  roles:

    - role: proxmox-save-data
      tags: "reset-proxmox"

    - role: proxmox-reset
      tags: "reset-proxmox"

    - role: clean-local-files
      tags: "reset-proxmox"

##############################################
# Uninstalling k3s
##############################################
- name: "Uninstall k3s"
  hosts: k8s_cluster
  become: true
  gather_facts: no

  roles:

    - role: kubernetes-uninstall
      tags:
        - k3s-uninstall
